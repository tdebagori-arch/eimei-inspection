<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIMEI 校舎視察レポート</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo",sans-serif;background:#f5f5f0;min-height:100vh;color:#1a1a1a}
#app{max-width:640px;margin:0 auto;padding:0 0 80px}
.header{background:#fff;border-bottom:1px solid #e8e8e3;padding:14px 20px;position:sticky;top:0;z-index:100}
.header-title{font-size:16px;font-weight:600;color:#1a1a1a}
.header-sub{font-size:12px;color:#999;margin-top:2px}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e8e8e3;overflow-x:auto}
.tab{padding:11px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#888;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;flex-shrink:0}
.tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;font-weight:600}
.content{padding:16px}
.section-card{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:16px;margin-bottom:12px}
.section-label{font-size:13px;font-weight:600;color:#555;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.badge-good{background:#EAF3DE;color:#3B6D11;font-size:11px;padding:2px 8px;border-radius:999px}
.badge-bad{background:#FCEBEB;color:#A32D2D;font-size:11px;padding:2px 8px;border-radius:999px}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:500}
input[type=text],select,textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:#1a1a1a;-webkit-appearance:none}
input[type=text]:focus,select:focus,textarea:focus{outline:none;border-color:#888}
textarea{resize:vertical;min-height:72px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.photo-upload-zone{border:1.5px dashed #ccc;border-radius:10px;padding:12px;text-align:center;color:#999;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;background:#fafafa}
.photo-preview{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.photo-thumb{width:58px;height:58px;border-radius:10px;background:#f0f0ec;border:1px solid #e0e0da;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative}
.photo-thumb .remove{position:absolute;top:-7px;right:-7px;width:18px;height:18px;background:#E24B4A;color:#fff;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700}
.submit-btn{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit}
.submit-btn:active{background:#333}
.divider{border:none;border-top:1px solid #f0f0ec;margin:12px 0}
.success-banner{background:#EAF3DE;border:1px solid #97C459;border-radius:10px;padding:12px 16px;color:#3B6D11;font-size:14px;display:none;align-items:center;gap:8px;margin-bottom:12px}

/* ホーム */
.alert-banner{background:#FFF8EC;border:1px solid #FAC775;border-radius:14px;padding:16px;margin-bottom:14px}
.alert-title{font-size:13px;font-weight:700;color:#854F0B;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.alert-body{font-size:13px;color:#633806;line-height:1.6;margin-bottom:12px}
.top-issue-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid #FAC775}
.top-issue-rank{width:22px;height:22px;border-radius:50%;background:#EF9F27;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.top-issue-count{font-size:11px;color:#854F0B;background:#FAEEDA;border-radius:999px;padding:2px 8px;white-space:nowrap;margin-top:1px;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:#fff;border:1px solid #e8e8e3;border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:#1a1a1a}
.stat-label{font-size:11px;color:#999;margin-top:3px}
.recent-card{background:#fff;border:1px solid #e8e8e3;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.pct-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;flex-shrink:0}

/* 改善報告 */
.report-item{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:16px;margin-bottom:12px}
.issue-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid #f0f0ec}
.issue-check{width:24px;height:24px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;font-size:14px;background:#fff}
.issue-check.done{background:#EAF3DE;border-color:#97C459;color:#3B6D11}
.issue-text{font-size:14px;color:#1a1a1a;line-height:1.5}
.issue-text.done-text{text-decoration:line-through;color:#bbb}
.add-photo-btn{font-size:12px;padding:5px 10px;border-radius:999px;cursor:pointer;background:#EAF3DE;color:#3B6D11;border:1px solid #97C459;display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-family:inherit}
.after-photo-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;background:#EAF3DE;color:#3B6D11;padding:3px 10px;border-radius:999px;margin-top:6px}
.comment-input{width:100%;font-size:13px;margin-top:6px;padding:8px 10px;border:1px solid #e0e0da;border-radius:8px;font-family:inherit}

/* 一覧 */
.list-card{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:16px;margin-bottom:12px}
.progress-bar-wrap{background:#f0f0ec;border-radius:999px;height:8px;flex:1;margin:0 10px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:999px;transition:width 0.4s}
.issue-tag{font-size:11px;padding:3px 8px;border-radius:999px;margin-right:4px;margin-top:4px;display:inline-block;font-weight:500}
.tag-done{background:#EAF3DE;color:#3B6D11}
.tag-pending{background:#FAEEDA;color:#854F0B}
.before-after{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.ba-photo{width:100%;aspect-ratio:4/3;border-radius:10px;background:#f5f5f0;border:1px solid #e8e8e3;display:flex;align-items:center;justify-content:center;font-size:32px}
.ba-photo.empty{opacity:0.3}
.detail-toggle{font-size:12px;color:#999;cursor:pointer;display:flex;align-items:center;gap:4px;margin-top:10px;background:none;border:none;padding:0;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">📋 EIMEI 校舎視察レポート</div>
    <div class="header-sub">校舎視察・改善管理システム</div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('home')">🏠 ホーム</button>
    <button class="tab" onclick="switchTab('form')">📝 視察レポート</button>
    <button class="tab" onclick="switchTab('fix')">🔧 改善報告</button>
    <button class="tab" onclick="switchTab('list')">📊 一覧</button>
  </div>

  <div class="content">
    <!-- ホーム -->
    <div id="tab-home"><div id="home-content"></div></div>

    <!-- 視察レポート -->
    <div id="tab-form" style="display:none">
      <div class="success-banner" id="success-msg">✅ レポートを提出しました！</div>
      <div class="row2">
        <div class="field"><label>視察日</label><input type="text" id="f-date" placeholder="例：2025年5月28日"/></div>
        <div class="field"><label>担当者名</label><input type="text" id="f-name" placeholder="例：田中 花子"/></div>
      </div>
      <div class="field">
        <label>視察した校舎</label>
        <select id="f-branch">
          <option value="">-- 校舎を選択 --</option>
          <option>エイメイ鶴瀬・Luce</option>
          <option>エイメイみずほ台・Luce</option>
          <option>エイメイふじみ野</option>
          <option>明成ふじみ野</option>
          <option>ソヨカふじみ野</option>
          <option>明成鶴瀬東</option>
          <option>明成新河岸</option>
          <option>水谷</option>
          <option>明成志木</option>
          <option>明成朝霞台</option>
          <option>明成鶴瀬西</option>
          <option>予備校 鶴瀬</option>
          <option>予備校 ふじみ野</option>
          <option>南古谷</option>
          <option>三芳藤久保</option>
          <option>富士見羽沢</option>
          <option>川越南大塚</option>
          <option>ふじみ野大井</option>
          <option>柳瀬川</option>
          <option>上福岡清水町</option>
        </select>
      </div>
      <div class="section-card">
        <div class="section-label"><span class="badge-good">Good！</span>真似したいところ</div>
        <textarea id="f-good" placeholder="良かった点を記入"></textarea>
      </div>
      <div id="bad-sections-form"></div>
      <div class="section-card">
        <div class="section-label">💡 自校の取り組み</div>
        <textarea id="f-mybranch" placeholder="自分の校舎ではこんな工夫をしています…"></textarea>
      </div>
      <button class="submit-btn" onclick="submitReport()">レポートを提出する</button>
    </div>

    <!-- 改善報告 -->
    <div id="tab-fix" style="display:none">
      <div class="success-banner" id="fix-msg">✅ 改善報告を保存しました！</div>
      <p style="font-size:13px;color:#888;margin-bottom:12px">指摘された項目に対応したらチェック・写真・コメントを入力して保存してください。</p>
      <div id="fix-list"></div>
    </div>

    <!-- 一覧 -->
    <div id="tab-list" style="display:none">
      <p style="font-size:13px;color:#888;margin-bottom:12px">各校舎の改善進捗と視察前後の写真を確認できます。</p>
      <div id="overview-list"></div>
    </div>
  </div>
</div>

<script>
const badDefs=[
  {id:'outside',label:'外周辺'},
  {id:'entrance',label:'入り口・ロビー周辺'},
  {id:'toilet',label:'トイレ・水回り'},
  {id:'classroom',label:'教室（部屋番号も明記）'},
];
const pcMap={};
const beforeEmojis=['📷','🏫','📸'];

function buildFormBadSections(){
  const c=document.getElementById('bad-sections-form');
  badDefs.forEach(def=>{
    pcMap[def.id]=0;
    const div=document.createElement('div');
    div.className='section-card';
    div.innerHTML=`
      <div class="section-label"><span class="badge-bad">Bad！</span>${def.label}</div>
      <textarea placeholder="${def.label}で気になった点を記入"></textarea>
      <div class="photo-upload-zone" onclick="addPhoto('${def.id}',this)">
        📷 写真を追加（複数可）
      </div>
      <div class="photo-preview" id="prev_${def.id}"></div>
    `;
    c.appendChild(div);
  });
}

function addPhoto(key,zone){
  const preview=document.getElementById('prev_'+key);
  if(!pcMap[key]) pcMap[key]=0;
  const count=pcMap[key]++;
  const thumb=document.createElement('div');
  thumb.className='photo-thumb';
  thumb.innerHTML=`${beforeEmojis[count%beforeEmojis.length]}<span class="remove" onclick="this.parentElement.remove()">×</span>`;
  preview.appendChild(thumb);
}

function submitReport(){
  const b=document.getElementById('success-msg');
  b.style.display='flex';
  setTimeout(()=>b.style.display='none',3000);
  document.getElementById('f-date').value='';
  document.getElementById('f-name').value='';
  document.getElementById('f-branch').value='';
  document.getElementById('f-good').value='';
  document.getElementById('f-mybranch').value='';
}


const reports=[];

function getTopIssues(){
  const countMap={},exMap={};
  reports.forEach(r=>r.issues.forEach(i=>{
    countMap[i.label]=(countMap[i.label]||0)+1;
    if(!exMap[i.label]) exMap[i.label]=i.text;
  }));
  return Object.entries(countMap).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([label,count])=>({label,count,example:exMap[label]}));
}

function renderHome(){
  const c=document.getElementById('home-content');
  const top=getTopIssues();
  const totalIssues=reports.reduce((s,r)=>s+r.issues.length,0);
  const totalDone=reports.reduce((s,r)=>s+r.issues.filter(i=>i.done).length,0);
  const pct=totalIssues===0?100:Math.round(totalDone/totalIssues*100);
  const pctColor=pct===100?'#3B6D11':pct>=50?'#854F0B':'#A32D2D';

  const topRows=top.map((item,idx)=>`
    <div class="top-issue-row">
      <div class="top-issue-rank">${idx+1}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:13px;color:#633806">${item.label}</div>
        <div style="font-size:12px;color:#854F0B;margin-top:2px">${item.example}</div>
      </div>
      <div class="top-issue-count">${item.count}校舎</div>
    </div>`).join('');

  const recentRows=reports.map(r=>{
    const done=r.issues.filter(i=>i.done).length;
    const total=r.issues.length;
    const p=Math.round(done/total*100);
    const color=p===100?'#3B6D11':p>=50?'#854F0B':'#A32D2D';
    const bg=p===100?'#EAF3DE':p>=50?'#FAEEDA':'#FCEBEB';
    return `<div class="recent-card">
      <div>
        <div style="font-weight:600;font-size:14px">${r.branch}</div>
        <div style="font-size:12px;color:#999;margin-top:2px">${r.date}　${r.inspector}</div>
      </div>
      <span class="pct-badge" style="color:${color};background:${bg}">${p}% 改善済み</span>
    </div>`;
  }).join('');

  c.innerHTML=`
    <div class="alert-banner">
      <div class="alert-title">⚠️ 全校舎で多く上がっている指摘</div>
      <div class="alert-body">最近の視察で特に多く報告された項目です。<strong>自分の校舎でも確認してみましょう！</strong></div>
      ${topRows}
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${reports.length}</div><div class="stat-label">視察レポート数</div></div>
      <div class="stat-card"><div class="stat-num">${totalDone}<span style="font-size:14px;font-weight:400;color:#999">/${totalIssues}</span></div><div class="stat-label">改善済み件数</div></div>
      <div class="stat-card"><div class="stat-num" style="color:${pctColor}">${pct}%</div><div class="stat-label">全体改善率</div></div>
    </div>
    <div style="font-size:13px;font-weight:600;color:#888;margin-bottom:8px">最近の視察</div>
    ${recentRows}
  `;
}

function toggleIssue(rIdx,iIdx){
  reports[rIdx].issues[iIdx].done=!reports[rIdx].issues[iIdx].done;
  renderFix();renderHome();
}
function addAfterPhoto(rIdx,iIdx){
  reports[rIdx].issues[iIdx].hasAfterPhoto=true;
  renderFix();renderOverview();renderHome();
}
function saveComment(rIdx,iIdx,val){reports[rIdx].issues[iIdx].comment=val;}

function renderFix(){
  const c=document.getElementById('fix-list');c.innerHTML='';
  reports.forEach((r,rIdx)=>{
    const done=r.issues.filter(i=>i.done).length;
    const card=document.createElement('div');card.className='report-item';
    const issuesHtml=r.issues.map((issue,iIdx)=>`
      <div class="issue-row">
        <div class="issue-check ${issue.done?'done':''}" onclick="toggleIssue(${rIdx},${iIdx})">
          ${issue.done?'✓':''}
        </div>
        <div style="flex:1">
          <div style="margin-bottom:4px"><span class="badge-bad">${issue.label}</span></div>
          <div class="issue-text ${issue.done?'done-text':''}">${issue.text}</div>
          ${issue.hasAfterPhoto
            ?`<div class="after-photo-badge">📸 改善後の写真あり</div>`
            :`<button class="add-photo-btn" onclick="addAfterPhoto(${rIdx},${iIdx})">📷 改善後の写真を追加</button>`
          }
          <input class="comment-input" type="text" placeholder="対応コメントを入力…" value="${issue.comment}" onchange="saveComment(${rIdx},${iIdx},this.value)"/>
        </div>
      </div>`).join('');
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-weight:700;font-size:15px">${r.branch} <span style="font-size:12px;color:#999;font-weight:400">への指摘</span></div>
          <div style="font-size:12px;color:#999;margin-top:2px">${r.date}　${r.inspector}</div>
        </div>
        <div style="font-size:13px;font-weight:700;color:${done===r.issues.length?'#3B6D11':'#854F0B'}">${done}/${r.issues.length} 完了</div>
      </div>
      ${issuesHtml}
      <button class="submit-btn" style="padding:10px;font-size:13px;margin-top:12px" onclick="saveFix()">報告を保存する</button>`;
    c.appendChild(card);
  });
}

function saveFix(){
  const b=document.getElementById('fix-msg');b.style.display='flex';
  setTimeout(()=>b.style.display='none',2500);
  renderOverview();renderHome();
}

function toggleDetail(rIdx){reports[rIdx].showDetail=!reports[rIdx].showDetail;renderOverview();}

function renderOverview(){
  const c=document.getElementById('overview-list');c.innerHTML='';
  reports.forEach((r,rIdx)=>{
    const total=r.issues.length;
    const done=r.issues.filter(i=>i.done).length;
    const pct=Math.round(done/total*100);
    const barColor=pct===100?'#63B95E':pct>=50?'#EF9F27':'#E24B4A';
    const pctColor=pct===100?'#3B6D11':pct>=50?'#854F0B':'#A32D2D';
    const tags=r.issues.map(i=>`<span class="issue-tag ${i.done?'tag-done':'tag-pending'}">${i.done?'✅':'⏳'} ${i.label}</span>`).join('');
    const detail=r.issues.map(issue=>`
      <div style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
          <span class="badge-bad">${issue.label}</span>
          <span style="font-size:13px">${issue.text}</span>
        </div>
        ${issue.comment?`<div style="font-size:12px;color:#3B6D11;margin-bottom:6px">💬 ${issue.comment}</div>`:''}
        <div class="before-after">
          <div>
            <div style="font-size:11px;font-weight:600;color:#A32D2D;margin-bottom:4px">📷 視察時</div>
            <div class="ba-photo">📷</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:600;color:#3B6D11;margin-bottom:4px">✅ 改善後</div>
            ${issue.hasAfterPhoto?`<div class="ba-photo">✅</div>`:`<div class="ba-photo empty">🚫</div>`}
          </div>
        </div>
      </div>`).join('<hr class="divider">');
    const card=document.createElement('div');card.className='list-card';
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-weight:700;font-size:15px">${r.branch}</div>
          <div style="font-size:12px;color:#999">${r.date}　${r.inspector}</div>
        </div>
        <div style="font-size:14px;font-weight:700;color:${pctColor}">${pct}%</div>
      </div>
      <div style="display:flex;align-items:center;margin-bottom:8px">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        <span style="font-size:12px;color:#999;white-space:nowrap">${done}/${total}件</span>
      </div>
      <div>${tags}</div>
      <button class="detail-toggle" onclick="toggleDetail(${rIdx})">
        ${r.showDetail?'▲ 写真を閉じる':'▼ 視察前後の写真を見る'}
      </button>
      ${r.showDetail?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid #f0f0ec">${detail}</div>`:''}
    `;
    c.appendChild(card);
  });
}

function switchTab(tab){
  ['home','form','fix','list'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
  });
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['home','form','fix','list'][i]===tab);
  });
  if(tab==='home') renderHome();
  if(tab==='fix') renderFix();
  if(tab==='list') renderOverview();
}

buildFormBadSections();
renderHome();
</script>
</body>
</html>
